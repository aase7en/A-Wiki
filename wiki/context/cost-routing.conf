# cost-routing.conf — A-Wiki Universal Ingest Routing Policy (v1)
#
# Single source of truth for the cost-aware ingestion harness. Every A-Wiki
# agent (Claude Code, Codex, Gemini CLI, Cursor, Windsurf, Cline, Copilot,
# Aider, ...) reads THIS file before any ingest LLM call. Edit here once →
# propagates to every surface (CLI / MCP / shell wrappers / ENV overrides).
#
# Resolution order (highest priority first):
#   1. CLI flag        e.g. --tier 2  or  --backend openai
#   2. ENV var         A_WIKI_ROUTE_TIER, A_WIKI_BACKEND
#   3. This config file
#   4. [defaults] section below
#
# Format: shell-style KEY=VALUE with [section] headers. Comments start with #.
# Do NOT put secrets here — they live in drive/.secrets (read on-demand via
# scripts/lib/drive_secrets.py).

[scout]
enabled = true
script = scripts/model-scout-current.py
cache_path = .tmp/model-scout-current.json
policy_path = .tmp/model-router-policy.conf
ttl_hours = 24
required_before_route = true
note = scout current model/pricing before route; do not store live pricing as durable truth

[defaults]
ingest_tier = 1
escalation_threshold_files = 20
escalation_threshold_input_ratio = 3.0
escalation_quality_reject_pct = 30
harness_version = v1
# Tier 0 (free) is auto-selected only when complexity_classifier flags the
# task as "trivial" (small input + small expected output + classify-style work).
trivial_max_input_chars = 4000
trivial_max_expected_output_tokens = 1000

# Tier 00 — Subscription (primary agent, marginal cost = 0).
# Informational only. The harness NEVER auto-routes here — the primary agent
# decides when to handle work itself (planning, bugfix, validation, scout job).
# Listed so cost reports can show "no API call needed → tier 00".
[tier_00]
provider = anthropic-subscription
model = claude-sonnet
seed_only = true
mode = realtime
secret_name = NONE
context_tokens = 200000
price_input_per_mtok = 0
price_output_per_mtok = 0
note = primary-agent only; harness must not call this tier; seed only; replaced by scout

# Tier 0 — Free models (auto-discovered by scout.py; defaults here are seeds).
# Both providers compete; the adapter picks the cheapest+fastest free model
# from drive/batch-state/free-roster.json (refreshed by scout).
[tier_0]
provider = free
model = openrouter:google/gemini-2.0-flash-exp:free
seed_only = true
endpoint = https://openrouter.ai/api/v1
mode = realtime
secret_name = OPENROUTER_API_KEY
context_tokens = 1000000
price_input_per_mtok = 0
price_output_per_mtok = 0
# Fallback when OpenRouter free model is rate-limited.
fallback_provider = gemini
fallback_model = gemini-2.0-flash-exp
fallback_endpoint = https://generativelanguage.googleapis.com/v1beta
fallback_secret_name = GEMINI_API_KEY
note = seed only; replaced by scout

# Tier 1 — cheap-capable realtime route.
# Provider/model/price values below are emergency seeds only; scout replaces them.
[tier_1]
provider = deepseek
model = deepseek-chat
seed_only = true
endpoint = https://api.deepseek.com/v1
mode = realtime
secret_name = DEEPSEEK_API_KEY
context_tokens = 1000000
price_input_per_mtok = 0.14
price_output_per_mtok = 0.28
note = seed only; replaced by scout

# Tier 2 — cheap-capable batch route.
# Provider/model/price values below are emergency seeds only; scout replaces them.
[tier_2]
provider = openai
model = gpt-4o-mini
seed_only = true
endpoint = https://api.openai.com/v1
mode = batch
batch_window_hours = 24
secret_name = OPENAI_API_KEY
context_tokens = 128000
price_input_per_mtok = 0.075
price_output_per_mtok = 0.30
note = seed only; replaced by scout

# Tier 3 — platform-low-scout / quality escalation route.
# Provider/model/price values below are emergency seeds only; scout replaces them.
[tier_3]
provider = anthropic
model = claude-haiku-4-5
seed_only = true
endpoint = https://api.anthropic.com
mode = batch
batch_window_hours = 24
secret_name = ANTHROPIC_API_KEY
context_tokens = 200000
price_input_per_mtok = 0.50
price_output_per_mtok = 2.50
note = seed only; replaced by scout

# Tier 4a/4b/4c — Primary-model sub-ladder (informational only).
# These tiers document human/agent model selection inside Pyramid Level 4.
# The ingest harness MUST NOT auto-route here; primary agent decides.
[tier_4a]
provider = anthropic-subscription
model = haiku-class
seed_only = true
mode = interactive
secret_name = NONE
context_tokens = 200000
price_input_per_mtok = 1.00
price_output_per_mtok = 5.00
cache_read_multiplier = 0.10
cache_write_5m_multiplier = 1.25
cache_write_1h_multiplier = 2.00
note = primary-agent only; harness must not call this tier; use for verified helper work; seed only; replaced by scout

[tier_4b]
provider = anthropic-subscription
model = sonnet-class
seed_only = true
mode = interactive
secret_name = NONE
context_tokens = 200000
price_input_per_mtok = 3.00
price_output_per_mtok = 15.00
cache_read_multiplier = 0.10
cache_write_5m_multiplier = 1.25
cache_write_1h_multiplier = 2.00
note = primary-agent only; harness must not call this tier; default workhorse for implementation; seed only; replaced by scout

[tier_4c]
provider = anthropic-subscription
model = opus-fable-class
seed_only = true
mode = interactive
secret_name = NONE
context_tokens = 200000
price_input_per_mtok = 5.00
price_output_per_mtok = 25.00
alt_price_input_per_mtok = 10.00
alt_price_output_per_mtok = 50.00
cache_read_multiplier = 0.10
cache_write_5m_multiplier = 1.25
cache_write_1h_multiplier = 2.00
note = primary-agent only; harness must not call this tier; reserve for architecture risk and critical review; seed only; replaced by scout

# Scraper tiers — mapped to scripts/wiki/scrape-advanced.py methods.
# These tiers describe the web scraping/document conversion pipeline,
# separate from the LLM ingest tiers above.
[scraper_tier_0]
tools = MarkItDown, curl-impersonate
devices = all
cost = Free
desc = Document conversion + TLS-fingerprint HTTP fetch (no browser)
note = embedded in ingest-source.py; no extra install needed for basic operation

[scraper_tier_1]
tools = Scrapling, AutoScraper
devices = all
cost = Free
desc = Adaptive lightweight scraping + exemplar-based pattern extraction
note = needs pip install scrapling autoscraper

[scraper_tier_2]
tools = Crawl4AI
devices = macbook
cost = Free
desc = LLM/RAG-optimized crawler with chunking (needs Playwright + Chromium)
note = blocked on Pi5 (headless); needs playwright install

[scraper_tier_3]
tools = Firecrawl API
devices = all
cost = Paid (credits)
secret = FIRECRAWL_API_KEY
desc = Cloud API: web to Markdown/JSON
note = rate-limit: 50 req/day default; configure max in scrape-advanced.py

[scraper_tier_4]
tools = Browser Use, scrcpy
devices = macbook
cost = Free
desc = Agentic browser control + Android screen mirror
note = needs pip install browser-use playwright; blocked on Pi5/headless

[enforcement]
require_routed_via_frontmatter = true
hook_block_on_bypass = true
