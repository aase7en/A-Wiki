name: Deploy A-Wiki Live
# 🚀 Auto-deploy awiki-live.html to GitHub Pages on gh-pages push
# [Thai ไอ้A Plus Spot.] · A-Wiki Brain

on:
  push:
    branches: [gh-pages]
    paths:
      - 'awiki-live.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
