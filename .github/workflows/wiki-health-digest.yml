name: A-Wiki Weekly Health Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 3"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: wiki-health-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Build wiki health digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare fake external data layer
        run: |
          bash scripts/setup-cloud-link.sh --provider local --force
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, "scripts")
          from drive_path import get_drive_root

          root = get_drive_root()
          (root / "raw").mkdir(parents=True, exist_ok=True)
          (root / "raw" / "health-digest-smoke.md").write_text("# Health digest smoke source\n", encoding="utf-8")
          (root / ".secrets").write_text(
              "OPENROUTER_API_KEY=sk-or-v1-example\n"
              "GEMINI_API_KEY=AIza-example\n",
              encoding="utf-8",
          )
          journal = root / "personal" / "journal"
          journal.mkdir(parents=True, exist_ok=True)
          (journal / "session-memory.md").write_text(
              "## Active TODOs (cross-session)\n\n- [ ] **[ci]** health digest smoke\n",
              encoding="utf-8",
          )
          PY
          bash scripts/setup-cloud-link.sh --status

      - name: Prepare local generated config
        run: |
          bash scripts/setup-codex-hooks.sh
          python scripts/build-wiki-index.py

      - name: Generate digest
        run: |
          mkdir -p .tmp/wiki-health
          python scripts/wiki-health-digest.py \
            --out .tmp/wiki-health/digest.md \
            --json-out .tmp/wiki-health/digest.json
          cat .tmp/wiki-health/digest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-health-digest
          path: |
            .tmp/wiki-health/digest.md
            .tmp/wiki-health/digest.json
