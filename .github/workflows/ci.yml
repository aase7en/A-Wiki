name: A-Wiki CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: awiki-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Fast repo verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements.txt

      - name: Prepare fake external data layer
        run: |
          bash scripts/setup-cloud-link.sh --provider local --force
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, "scripts")
          from drive_path import get_drive_root

          root = get_drive_root()
          # full agent-preflight EXPECTED_DRIVE_FOLDERS contract
          for name in ("raw", "waste-reports", "personal-tools", "ocr-feedback", "individual-tasks"):
              (root / name).mkdir(parents=True, exist_ok=True)
          (root / "raw" / "ci-smoke.md").write_text("# CI smoke source\n", encoding="utf-8")
          (root / ".secrets").write_text(
              "OPENROUTER_API_KEY=sk-or-v1-example\n"
              "GEMINI_API_KEY=AIza-example\n",
              encoding="utf-8",
          )
          PY
          bash scripts/setup-cloud-link.sh --status
          python scripts/lib/drive_secrets.py --check

      - name: Prepare local generated config
        run: |
          bash scripts/setup-codex-hooks.sh
          python scripts/build-wiki-index.py

      - name: Privacy and syntax checks
        run: |
          python scripts/check-privacy.py
          bash -n scripts/setup-local.sh scripts/setup-cloud-link.sh scripts/update-model-roster.sh scripts/delegate.sh scripts/swarm/delegate.sh

      - name: Security pattern scan (USA-1 §5 Layer 3)
        # Scan the whole tracked tree for secret + machine-path patterns using
        # the shared scripts/hooks/security_patterns.yaml. Catches what the
        # privacy check's hardcoded patterns miss (machine-specific paths).
        run: |
          set -eu
          # Reuse the pre-commit scanner on the full tracked file set.
          EXIT=0
          for f in $(git ls-files '*.py' '*.sh' '*.md' '*.json' '*.yaml' '*.yml' '*.toml' | head -5000); do
            # Build a fake "added" diff line so the scanner's +line filter catches it.
            if ! printf '+%s\n' "$(cat "$f" 2>/dev/null)" | python scripts/hooks/_scan_staged_diff.py 2>/dev/null | grep -q .; then
              :
            else
              printf '::error::Security finding in %s\n' "$f"
              printf '+%s\n' "$(cat "$f")" | python scripts/hooks/_scan_staged_diff.py 2>/dev/null | head -3 | sed "s/^/  /"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: Skill registry consistency
        run: |
          python scripts/regen-skill-surfaces.py --validate
          python scripts/regen-skill-surfaces.py --check
          python scripts/verify-skill-surfaces.py

      - name: Wiki context freshness
        # Mirrors the regen-skill-surfaces --check pattern: regenerate all
        # wiki/context/*.md in memory (--no-chain skips downstream noise) and
        # fail if any committed file is stale. Catches un-regen'd context on PR.
        run: python scripts/gen-index.py --no-chain --check

      - name: Unit tests
        # Surface failing test ids as ::error annotations so they are
        # readable via the public check-runs API (logs need auth).
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee pytest-out.txt || {
            grep -E "^(FAILED|ERROR) " pytest-out.txt | head -20 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          }

      - name: MC notebook re-execution + copula math tests
        # Two guards run together (both need the scipy/numpy optional stack):
        #  (1) Re-run the seeded MC portfolio notebook (seeds 42/123) and fail
        #      if any output drifted — catches numpy/scipy API regressions
        #      silently changing the skill's canonical example outputs.
        #      Deterministic on x86_64; verified locally byte-identical after
        #      stripping per-run execution_count + metadata.execution.
        #  (2) Run the copula + MC integration tests (tests/test_monte_carlo_
        #      copula.py) which are skipped in the default Unit tests step
        #      because scipy is optional — but scipy is installed here.
        run: |
          python -m pip install nbconvert ipykernel numpy scipy -r requirements-optional.txt
          NB="skills/awiki/monte-carlo-quant-analysis/examples/portfolio_mc_1yr.ipynb"
          jupyter nbconvert --to notebook --execute "$NB" \
            --output-dir . --output reexec_tmp 2>&1 | tail -1
          python -c "
          import json
          def load(p):
              nb = json.load(open(p))
              for c in nb['cells']:
                  c.pop('execution_count', None)
                  c.get('metadata', {}).pop('execution', None)
              return nb
          assert load('$NB') == load('reexec_tmp.ipynb'), \
              'MC notebook outputs drifted — re-baseline or fix numpy/scipy regression'
          "
          rm -f reexec_tmp.ipynb
          python -m pytest tests/test_monte_carlo_copula.py -v

      - name: Readiness smoke
        # Surface [FAIL] lines as ::error annotations (public-API readable).
        run: |
          set -o pipefail
          # direct preflight run first: its per-check lines land in ready-out.txt
          # so failures annotate precisely (verify only reports the last line)
          python scripts/agent-preflight.py --skip-remote 2>&1 | tee ready-out.txt || true
          python scripts/verify-awiki-ready.py --skip-remote --skip-evals 2>&1 | tee -a ready-out.txt || {
            grep -E "FAIL" ready-out.txt | head -10 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          }
