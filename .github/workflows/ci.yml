name: A-Wiki CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: awiki-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Fast repo verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements.txt

      - name: Prepare fake external data layer
        run: |
          bash scripts/setup-cloud-link.sh --provider local --force
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, "scripts")
          from drive_path import get_drive_root

          root = get_drive_root()
          # full agent-preflight EXPECTED_DRIVE_FOLDERS contract
          for name in ("raw", "waste-reports", "personal-tools", "ocr-feedback", "individual-tasks"):
              (root / name).mkdir(parents=True, exist_ok=True)
          (root / "raw" / "ci-smoke.md").write_text("# CI smoke source\n", encoding="utf-8")
          (root / ".secrets").write_text(
              "OPENROUTER_API_KEY=sk-or-v1-example\n"
              "GEMINI_API_KEY=AIza-example\n",
              encoding="utf-8",
          )
          PY
          bash scripts/setup-cloud-link.sh --status
          python scripts/lib/drive_secrets.py --check

      - name: Prepare local generated config
        run: |
          bash scripts/setup-codex-hooks.sh
          python scripts/build-wiki-index.py

      - name: Privacy and syntax checks
        run: |
          python scripts/check-privacy.py
          bash -n scripts/setup-local.sh scripts/setup-cloud-link.sh scripts/update-model-roster.sh scripts/delegate.sh scripts/swarm/delegate.sh

      - name: Skill registry consistency
        run: |
          python scripts/regen-skill-surfaces.py --validate
          python scripts/regen-skill-surfaces.py --check

      - name: Unit tests
        # Surface failing test ids as ::error annotations so they are
        # readable via the public check-runs API (logs need auth).
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee pytest-out.txt || {
            grep -E "^(FAILED|ERROR) " pytest-out.txt | head -20 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          }

      - name: Readiness smoke
        # Surface [FAIL] lines as ::error annotations (public-API readable).
        run: |
          set -o pipefail
          # direct preflight run first: its per-check lines land in ready-out.txt
          # so failures annotate precisely (verify only reports the last line)
          python scripts/agent-preflight.py --skip-remote 2>&1 | tee ready-out.txt || true
          python scripts/verify-awiki-ready.py --skip-remote --skip-evals 2>&1 | tee -a ready-out.txt || {
            grep -E "FAIL" ready-out.txt | head -10 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          }
