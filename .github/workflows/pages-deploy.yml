name: Deploy A-Wiki Live to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'awiki-live.html'
      - 'index.html'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload ONLY the live-dashboard payload. Uploading '.' shipped the
      # whole repo — including tracked symlinks (.codex/hooks, .kilo/*),
      # which the Pages artifact tar rejects and the deploy fails.
      - name: Stage Pages payload
        run: |
          mkdir -p _site
          cp awiki-live.html _site/
          cp awiki-live.html _site/index.html
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
