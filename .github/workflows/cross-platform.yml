name: A-Wiki Cross-Platform Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: awiki-cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements.txt

      - name: Prepare fake external data layer
        run: |
          bash scripts/setup-cloud-link.sh --provider local --force
          python - <<'PY'
          import sys
          sys.path.insert(0, "scripts")
          from drive_path import get_drive_root

          root = get_drive_root()
          (root / "raw").mkdir(parents=True, exist_ok=True)
          (root / "raw" / "ci-smoke.md").write_text("# CI smoke source\n", encoding="utf-8")
          (root / ".secrets").write_text(
              "OPENROUTER_API_KEY=sk-or-v1-example\n"
              "GEMINI_API_KEY=AIza-example\n",
              encoding="utf-8",
          )
          PY
          bash scripts/setup-cloud-link.sh --status
          python scripts/lib/drive_secrets.py --check

      - name: Prepare local generated config
        run: |
          bash scripts/setup-codex-hooks.sh
          python scripts/build-wiki-index.py

      - name: Cross-platform verifier
        run: python scripts/verify-cross-platform.py

      - name: Readiness smoke
        run: python scripts/verify-awiki-ready.py --skip-remote --skip-evals

      - name: Full vector build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/verify-cross-platform.py --build-vec
