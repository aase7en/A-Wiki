name: Provider Balance Check
# ☁️ Query API balances from all connected providers
# [Thai ไอ้A Plus Spot.] · A-Wiki Brain + Hermes Agent

on:
  workflow_dispatch:          # Manual trigger
  schedule:
    - cron: '0 6 * * *'      # Daily 6AM UTC = 1PM ICT

jobs:
  check-balance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Repo secrets are optional on forks / before setup — skip gracefully
      # (with a visible notice) instead of failing every day.
      - name: Check secrets configured
        id: cfg
        run: |
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::API-key secrets not configured in repo settings — balance check skipped"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Provider Balances
        if: steps.cfg.outputs.configured == 'true'
        run: python3 scripts/hermes/provider-balance-check.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      - name: Post results to Telegram
        if: steps.cfg.outputs.configured == 'true' && secrets.TELEGRAM_BOT_TOKEN != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ☁️ Provider Balance Report
            
            $(cat provider-balance-report.md)
