name: Build Pake Desktop App
# 🖥️ Build A-Wiki Live as a native desktop app using Pake (Rust/Tauri v2)
# [Thai ไอ้A Plus Spot.] · A-Wiki Brain + Hermes Agent

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to package'
        required: true
        default: 'https://aase7en.github.io/A-Wiki/awiki-live.html'
      app_name:
        description: 'App name'
        required: true
        default: 'A-Wiki Live'
      icon_url:
        description: 'Icon URL (optional)'
        required: false
        default: ''
      width:
        description: 'Window width'
        required: false
        default: '480'
      height:
        description: 'Window height'
        required: false
        default: '720'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Build Pake app (Linux)
        if: runner.os == 'Linux'
        env:
          PAKE_URL: ${{ inputs.url }}
          PAKE_NAME: ${{ inputs.app_name }}
          PAKE_WIDTH: ${{ inputs.width }}
          PAKE_HEIGHT: ${{ inputs.height }}
          PAKE_ICON: ${{ inputs.icon_url }}
        run: |
          ICON_ARG=""
          if [ -n "$PAKE_ICON" ]; then ICON_ARG="--icon $PAKE_ICON"; fi
          pake "$PAKE_URL" --name "$PAKE_NAME" --width "$PAKE_WIDTH" --height "$PAKE_HEIGHT" $ICON_ARG
          echo "Built files:"
          ls -la *.AppImage *.deb 2>/dev/null || echo "Checking output dir..."
          find . -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.exe" 2>/dev/null

      - name: Build Pake app (macOS)
        if: runner.os == 'macOS'
        env:
          PAKE_URL: ${{ inputs.url }}
          PAKE_NAME: ${{ inputs.app_name }}
          PAKE_WIDTH: ${{ inputs.width }}
          PAKE_HEIGHT: ${{ inputs.height }}
          PAKE_ICON: ${{ inputs.icon_url }}
        run: |
          ICON_ARG=""
          if [ -n "$PAKE_ICON" ]; then ICON_ARG="--icon $PAKE_ICON"; fi
          pake "$PAKE_URL" --name "$PAKE_NAME" --width "$PAKE_WIDTH" --height "$PAKE_HEIGHT" $ICON_ARG
          find . -name "*.dmg" 2>/dev/null

      - name: Build Pake app (Windows)
        if: runner.os == 'Windows'
        env:
          PAKE_URL: ${{ inputs.url }}
          PAKE_NAME: ${{ inputs.app_name }}
          PAKE_WIDTH: ${{ inputs.width }}
          PAKE_HEIGHT: ${{ inputs.height }}
        run: |
          pake "%PAKE_URL%" --name "%PAKE_NAME%" --width %PAKE_WIDTH% --height %PAKE_HEIGHT%
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-${{ runner.os }}
          path: |
            **/*.dmg
            **/*.AppImage
            **/*.exe
            **/*.msi
            **/*.deb
