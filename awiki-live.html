<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A-Wiki Live — AI Chat</title>
<style>
:root {
  --bg: #06060d; --bg2: #0c0c18; --bg3: #14142a; --bg4: #1e1e3a;
  --border: #15153a; --border2: #26265a;
  --brand: #5eead4; --warm: #fbbf24; --cool: #60a5fa; --violet: #a78bfa;
  --success: #34d399; --danger: #f87171; --muted: #64748b;
  --text: #f1f5f9; --text2: #cbd5e1; --text3: #64748b;
  --r: 8px; --rl: 16px; --rr: 9999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }

/* Header */
#header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: linear-gradient(135deg, var(--bg2), var(--bg3)); border-bottom: 1px solid var(--border); flex-shrink: 0; }
#header .brand { font-size: 18px; font-weight: 800; background: linear-gradient(90deg, var(--brand), var(--warm), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
#header .dot.on { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
#header .status { font-size: 11px; color: var(--text3); margin-left: auto; }
#header .config-btn { background: none; border: 1px solid var(--border2); color: var(--text3); padding: 5px 10px; border-radius: var(--r); cursor: pointer; font-size: 11px; }
#header .config-btn:hover { border-color: var(--brand); color: var(--brand); }

/* Settings overlay */
#settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center; }
#settings-overlay.show { display: flex; }
#settings-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: 24px; width: 90%; max-width: 420px; }
#settings-box h3 { margin-bottom: 16px; color: var(--brand); }
#settings-box label { display: block; font-size: 12px; color: var(--text3); margin: 12px 0 4px; }
#settings-box input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text); font-size: 14px; font-family: monospace; }
#settings-box input:focus { border-color: var(--brand); outline: none; }
#settings-box .btn-row { display: flex; gap: 8px; margin-top: 16px; }
#settings-box button { flex: 1; padding: 10px; border-radius: var(--r); cursor: pointer; font-size: 14px; }
#settings-box .save { background: var(--brand); color: #000; border: none; font-weight: 700; }
#settings-box .cancel { background: none; border: 1px solid var(--border2); color: var(--text2); }

/* Messages */
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Welcome */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; }
.welcome .icon { font-size: 60px; margin-bottom: 16px; }
.welcome h2 { font-size: 22px; margin-bottom: 4px; }
.welcome p { color: var(--text3); font-size: 13px; margin-bottom: 24px; max-width: 320px; line-height: 1.6; }
.welcome .qs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.welcome .qs button { padding: 8px 16px; border-radius: var(--rr); border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 12px; white-space: nowrap; transition: all .2s; }
.welcome .qs button:hover { border-color: var(--brand); color: var(--brand); background: rgba(94,234,212,.08); }

/* Message bubbles */
.msg { display: flex; gap: 10px; animation: fadeIn .3s ease; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.hermes { align-self: flex-start; }
.msg .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.msg.user .avatar { background: var(--cool); }
.msg.hermes .avatar { background: linear-gradient(135deg, var(--brand), var(--violet)); }
.msg .bubble { padding: 10px 16px; border-radius: var(--rl); font-size: 14px; line-height: 1.6; word-break: break-word; }
.msg.user .bubble { background: var(--cool); color: #fff; border-bottom-right-radius: 4px; }
.msg.hermes .bubble { background: var(--bg2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg .bubble pre { background: var(--bg); padding: 10px 14px; border-radius: var(--r); overflow-x: auto; font-size: 12px; margin: 8px 0; border: 1px solid var(--border); font-family: 'SF Mono', 'JetBrains Mono', monospace; }
.msg .bubble code { font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 12px; background: rgba(94,234,212,.1); padding: 2px 5px; border-radius: 3px; }
.msg .bubble pre code { background: none; padding: 0; }
.msg .bubble strong { color: var(--brand); }
.msg .time { font-size: 10px; color: var(--text3); margin-top: 6px; }

/* Loading dots */
.loading { display: flex; gap: 5px; padding: 12px 16px; }
.loading .d { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); animation: bounce .6s infinite alternate; }
.loading .d:nth-child(2) { animation-delay: .2s; }
.loading .d:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { to { transform: translateY(-6px); opacity: .4; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Input bar */
#input-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg2); align-items: flex-end; flex-shrink: 0; }
#input-bar textarea { flex: 1; resize: none; padding: 10px 14px; border-radius: var(--rl); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.5; max-height: 150px; min-height: 46px; outline: none; transition: border-color .2s; }
#input-bar textarea:focus { border-color: var(--brand); box-shadow: 0 0 12px rgba(94,234,212,.12); }
#input-bar .send { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, var(--brand), var(--cool)); border: none; color: #000; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .2s; }
#input-bar .send:disabled { opacity: .4; cursor: not-allowed; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 20px; border-radius: var(--rr); font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Connection banner */
#conn-banner { display: none; padding: 6px 16px; background: rgba(251,191,36,.1); border-bottom: 1px solid rgba(251,191,36,.2); font-size: 11px; color: var(--warm); text-align: center; }
#conn-banner.show { display: block; }

/* Mobile */
@media (max-width: 500px) {
  .msg { max-width: 92%; }
  #input-bar { padding: 10px 12px; }
  #input-bar textarea { font-size: 16px; }
}

/* Profile selector */
#settings-box .profile-row { display: flex; gap: 6px; align-items: center; margin-top: 12px; }
#settings-box select { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text); font-size: 14px; }
#settings-box select:focus { border-color: var(--brand); outline: none; }
.btn-sm { padding: 6px 12px; border-radius: var(--r); cursor: pointer; font-size: 11px; background: none; border: 1px solid var(--border2); color: var(--text2); white-space: nowrap; }
.btn-sm:hover { border-color: var(--brand); color: var(--brand); }
.btn-sm.test { border-color: var(--success); color: var(--success); }
.btn-sm.test:hover { background: rgba(52,211,153,.1); }
#settings-box .test-result { font-size: 11px; margin-top: 6px; min-height: 16px; }
#settings-box .test-result.ok { color: var(--success); }
#settings-box .test-result.fail { color: var(--danger); }
.conn-mode { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; }
.mode-lan { background: rgba(96,165,250,.15); color: var(--cool); }
.mode-tailscale { background: rgba(167,139,250,.15); color: var(--violet); }
.mode-funnel { background: rgba(251,191,36,.15); color: var(--warm); }
.mode-custom { background: rgba(100,116,139,.15); color: var(--muted); }
.mode-cloudflare { background: rgba(251,146,60,.15); color: #fb923c; }
.latency { font-size: 10px; color: var(--text3); margin-left: 4px; }

/* Login overlay */
#login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 300; justify-content: center; align-items: center; }
#login-overlay.show { display: flex; }
#login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: 32px 24px; width: 90%; max-width: 380px; text-align: center; }
#login-box h3 { margin-bottom: 8px; color: var(--brand); font-size: 18px; }
#login-box p { color: var(--text3); font-size: 13px; margin-bottom: 20px; }
#login-box input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text); font-size: 16px; font-family: monospace; text-align: center; letter-spacing: 4px; }
#login-box input:focus { border-color: var(--brand); outline: none; }
#login-box button { width: 100%; padding: 12px; border-radius: var(--r); background: linear-gradient(135deg, var(--brand), var(--cool)); border: none; color: #000; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 14px; }
#login-error { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="dot" id="status-dot"></div>
    <span class="brand">A-Wiki Live</span>
    <span class="status" id="status-text">● connecting…</span>
    <button class="config-btn" onclick="toggleSettings()">⚙️</button>
  </div>
  <div id="conn-banner">⚠️ เชื่อมต่อ Hermes ไม่ได้ — ตรวจสอบว่า Pi 5 เปิดอยู่และ Tailscale เชื่อมต่อ</div>
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">🧠</div>
      <h2>Hermes + A-Wiki Brain</h2>
      <p>ถามอะไรก็ได้ — Hermes จะค้นจาก Wiki 605+ หน้าให้ ใช้ได้ทุกที่ ทุกอุปกรณ์</p>
      <div class="qs">
        <button onclick="quickAsk('สรุปความรู้เรื่อง MQTT ใน wiki')">📡 MQTT</button>
        <button onclick="quickAsk('ESP32 มีสเปคอะไรบ้างในแล็บ')">🔌 ESP32</button>
        <button onclick="quickAsk('ออกแบบระบบวัดอุณหภูมิวัคซีนด้วย IoT ยังไง')">💉 Cold Chain</button>
        <button onclick="quickAsk('model roster ตอนนี้มี free model อะไรบ้าง')">🤖 Models</button>
      </div>
    </div>
  </div>
  <div id="input-bar">
    <textarea id="ta" rows="1" placeholder="ถาม Hermes... (ใช้สมอง A-Wiki ตอบ)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button class="send" id="send-btn" onclick="send()">▶</button>
  </div>
</div>

<div id="settings-overlay" onclick="if(event.target===this)toggleSettings()">
  <div id="settings-box">
    <h3>⚙️ Hermes Server</h3>
    <label>Connection Profile</label>
    <div class="profile-row">
      <select id="cfg-profile" onchange="onProfileChange()">
        <option value="lan">🏠 LAN (ที่บ้าน)</option>
        <option value="tailscale">🔗 Tailscale (นอกบ้าน)</option>
        <option value="funnel">🌐 Tailscale Funnel</option>
        <option value="cloudflare">☁️ Cloudflare Tunnel</option>
        <option value="custom">✏️ กำหนดเอง</option>
      </select>
      <button class="btn-sm test" onclick="manualTest()">🧪 Test</button>
      <button class="btn-sm" onclick="autoDetect()">🔍 Auto</button>
    </div>
    <div class="test-result" id="test-result"></div>
    <label>API Server URL</label>
    <input type="text" id="cfg-url" placeholder="http://pi5-local:8501">
    <label>API Key (ถ้ามี)</label>
    <input type="password" id="cfg-key" placeholder="ปล่อยว่างถ้าไม่ต้องใช้">
    <div class="btn-row">
      <button class="cancel" onclick="toggleSettings()">ยกเลิก</button>
      <button class="save" onclick="saveSettings()">💾 บันทึก</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Login overlay -->
<div id="login-overlay" class="show">
  <div id="login-box">
    <h3>🔐 Team Access</h3>
    <p>ใส่รหัสผ่านทีมเพื่อใช้งาน A-Wiki Live</p>
    <input type="password" id="login-token" placeholder="••••••••" maxlength="64" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">เข้าสู่ระบบ</button>
    <div id="login-error"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────
const STORAGE_KEY = 'awiki-live-config';
const PROFILES = {
  lan:     { name: 'LAN (ที่บ้าน)',     url: 'http://pi5-local:8501',            hint: 'ต้องอยู่ใน WiFi เดียวกัน',          cls: 'mode-lan' },
  tailscale:{ name: 'Tailscale (นอกบ้าน)', url: 'http://100.x.y.z:8501',     hint: 'ต้องเปิด Tailscale บน Pi 5',       cls: 'mode-tailscale' },
  funnel:  { name: 'Tailscale Funnel',  url: 'https://pi5.xxx.ts.net',            hint: 'รัน: tailscale funnel 8501',        cls: 'mode-funnel' },
  cloudflare:{ name: 'Cloudflare Tunnel', url: 'https://awiki-hermes.yourdomain.com', hint: 'ต้องติดตั้ง cloudflared บน Pi 5',   cls: 'mode-cloudflare' },
  custom:  { name: 'กำหนดเอง',           url: '',                                  hint: '',                                  cls: 'mode-custom' }
};
let currentProfile = 'tailscale';
let HERMES_URL = PROFILES.tailscale.url;
let HERMES_KEY = '';
let AUTH_SERVER = 'http://localhost:7790';
let AUTH_TOKEN = '';
let loading = false;

// Load saved config
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved) {
    if (saved.profile && PROFILES[saved.profile]) currentProfile = saved.profile;
    if (saved.url) HERMES_URL = saved.url;
    if (saved.key) HERMES_KEY = saved.key;
    if (saved.token) AUTH_TOKEN = saved.token;
    if (saved.authServer) AUTH_SERVER = saved.authServer;
  }
} catch(e) {}

document.getElementById('cfg-profile').value = currentProfile;
document.getElementById('cfg-url').value = HERMES_URL;
document.getElementById('cfg-key').value = HERMES_KEY;

function onProfileChange() {
  const p = document.getElementById('cfg-profile').value;
  const cfgUrl = document.getElementById('cfg-url');
  if (p === 'custom') {
    cfgUrl.value = '';
    cfgUrl.focus();
  } else if (PROFILES[p] && PROFILES[p].url) {
    cfgUrl.value = PROFILES[p].url;
  }
}

// ── HELPERS ─────────────────────────────────────────
const $ = id => document.getElementById(id);
const toast = (msg, ms=2500) => {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), ms);
};

// ── AUTH ─────────────────────────────────────────────
function checkAuth() {
  if (AUTH_TOKEN) {
    $('login-overlay').classList.remove('show');
    checkConnection();
  } else {
    $('login-overlay').classList.add('show');
    $('login-token').focus();
  }
}

async function doLogin() {
  const token = $('login-token').value.trim();
  const errEl = $('login-error');
  if (!token) { errEl.textContent = 'กรุณาใส่รหัสผ่าน'; return; }
  errEl.textContent = '⏳ กำลังตรวจสอบ...';
  try {
    const resp = await fetch(AUTH_SERVER + '/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
      signal: AbortSignal.timeout(5000)
    });
    const data = await resp.json();
    if (data.valid) {
      AUTH_TOKEN = token;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ profile: currentProfile, url: HERMES_URL, key: HERMES_KEY, token: AUTH_TOKEN, authServer: AUTH_SERVER }));
      $('login-overlay').classList.remove('show');
      checkConnection();
      toast('✅ เข้าสู่ระบบแล้ว');
    } else {
      errEl.textContent = '❌ รหัสผ่านไม่ถูกต้อง';
    }
  } catch(e) {
    errEl.textContent = '❌ เชื่อมต่อ Auth Server ไม่ได้ — ตรวจสอบว่า dashboard server (port 7790) ทำงานอยู่';
  }
}

function toggleSettings() {
  const el = $('settings-overlay');
  el.classList.toggle('show');
  if (el.classList.contains('show')) {
    $('cfg-profile').value = currentProfile;
    $('cfg-url').value = HERMES_URL;
    $('cfg-key').value = HERMES_KEY;
    $('test-result').textContent = '';
  }
}

function saveSettings() {
  currentProfile = $('cfg-profile').value;
  HERMES_URL = $('cfg-url').value.trim() || PROFILES[currentProfile]?.url || 'http://pi5-local:8501';
  HERMES_KEY = $('cfg-key').value.trim();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ profile: currentProfile, url: HERMES_URL, key: HERMES_KEY, token: AUTH_TOKEN, authServer: AUTH_SERVER }));
  toggleSettings();
  checkConnection();
  toast('✅ บันทึกแล้ว!');
}

// ── CONNECTION CHECK ────────────────────────────────
async function checkConnection() {
  const dot = $('status-dot');
  const txt = $('status-text');
  const banner = $('conn-banner');
  const profile = PROFILES[currentProfile] || { name: 'Custom', cls: 'mode-custom' };
  const start = Date.now();
  try {
    const resp = await fetch(HERMES_URL + '/health', { method: 'GET', signal: AbortSignal.timeout(5000) });
    const ms = Date.now() - start;
    if (resp.ok) {
      dot.classList.add('on');
      txt.innerHTML = '● connected <span class="conn-mode ' + profile.cls + '">' + profile.name + '</span><span class="latency">' + ms + 'ms</span>';
      banner.classList.remove('show');
    } else {
      dot.classList.remove('on');
      txt.innerHTML = '○ offline <span class="conn-mode ' + profile.cls + '">' + profile.name + '</span>';
      banner.classList.add('show');
    }
  } catch(e) {
    dot.classList.remove('on');
    txt.innerHTML = '○ offline <span class="conn-mode ' + profile.cls + '">' + profile.name + '</span>';
    banner.classList.add('show');
  }
}
checkConnection();
setInterval(checkConnection, 30000);

// ── AUTO-DETECT ──────────────────────────────────────
async function autoDetect() {
  const result = $('test-result');
  result.textContent = '🔍 กำลังค้นหา...';
  result.className = 'test-result';
  const order = ['lan', 'tailscale', 'funnel'];
  for (const key of order) {
    const url = PROFILES[key].url;
    if (!url) continue;
    try {
      const resp = await fetch(url + '/health', { method: 'GET', signal: AbortSignal.timeout(3000) });
      if (resp.ok) {
        $('cfg-profile').value = key;
        $('cfg-url').value = url;
        result.textContent = '✅ เจอ! ' + PROFILES[key].name + ' (' + url + ')';
        result.className = 'test-result ok';
        return;
      }
    } catch(e) {}
  }
  result.textContent = '❌ ไม่พบ Hermes — ลองเปิด Funnel หรือตรวจสอบ Pi 5';
  result.className = 'test-result fail';
}

async function manualTest() {
  const url = $('cfg-url').value.trim();
  if (!url) { $('test-result').textContent = '❌ กรุณาใส่ URL'; $('test-result').className = 'test-result fail'; return; }
  const result = $('test-result');
  result.textContent = '⏳ กำลังทดสอบ...';
  result.className = 'test-result';
  const start = Date.now();
  try {
    const resp = await fetch(url + '/health', { method: 'GET', signal: AbortSignal.timeout(5000) });
    const ms = Date.now() - start;
    if (resp.ok) {
      result.textContent = '✅ Connected! ' + ms + 'ms';
      result.className = 'test-result ok';
    } else {
      result.textContent = '⚠️ HTTP ' + resp.status + ' — ' + ms + 'ms';
      result.className = 'test-result fail';
    }
  } catch(e) {
    result.textContent = '❌ ' + (e.name === 'TimeoutError' ? 'หมดเวลา (5s)' : 'เชื่อมต่อไม่ได้') + ' — ตรวจสอบว่า Pi 5 เปิดอยู่และ Tailscale/Funnel ทำงาน';
    result.className = 'test-result fail';
  }
}

// ── MESSAGES ─────────────────────────────────────────
function addMsg(role, text) {
  const wel = $('welcome');
  if (wel) wel.style.display = 'none';

  const wrap = $('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? '👤' : '🧠';

  const bub = document.createElement('div');
  bub.className = 'bubble';

  // Simple markdown parse
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');

  bub.innerHTML = html;

  const tm = document.createElement('div');
  tm.className = 'time';
  tm.textContent = new Date().toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'});

  bub.appendChild(tm);
  div.append(av, bub);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function addLoading() {
  const wrap = $('messages');
  const div = document.createElement('div');
  div.className = 'msg hermes';
  div.id = 'loading-msg';
  div.innerHTML = '<div class="avatar" style="background:linear-gradient(135deg,var(--brand),var(--violet))">🧠</div><div class="loading"><div class="d"></div><div class="d"></div><div class="d"></div></div>';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeLoading() {
  const el = $('loading-msg');
  if (el) el.remove();
}

// ── SEND ─────────────────────────────────────────────
async function send() {
  if (loading) return;
  const ta = $('ta');
  const msg = ta.value.trim();
  if (!msg) return;

  loading = true;
  $('send-btn').disabled = true;
  ta.value = '';
  ta.style.height = 'auto';

  addMsg('user', msg);
  addLoading();

  try {
    const body = JSON.stringify({
      messages: [
        { role: 'system', content: 'You are Hermes, an AI assistant with access to the A-Wiki knowledge base (605+ wiki pages at ~/A-Wiki/wiki/). Use the terminal to search the wiki before answering: `python3 ~/A-Wiki/scripts/search-wiki.py "query"`. For IoT/ESP32/MQTT questions, search wiki/entities/iot/ and wiki/concepts/iot/. For pharmacy questions, search wiki/entities/pharmacy/. Always cite wiki sources. Respond in Thai (ภาษาไทย) unless the user asks in English.' },
        { role: 'user', content: msg }
      ],
      stream: false,
      max_tokens: 4000
    });

    const headers = { 'Content-Type': 'application/json' };
    if (HERMES_KEY) headers['Authorization'] = 'Bearer ' + HERMES_KEY;
    else if (AUTH_TOKEN) headers['Authorization'] = 'Bearer ' + AUTH_TOKEN;

    const resp = await fetch(HERMES_URL + '/v1/chat/completions', {
      method: 'POST',
      headers,
      body,
      signal: AbortSignal.timeout(120000)
    });

    removeLoading();

    if (!resp.ok) {
      const err = await resp.text();
      const profile = PROFILES[currentProfile] || { name: 'Custom' };
      addMsg('hermes', '⚠️ **Hermes ตอบกลับไม่สำเร็จ**\n\nServer: ' + profile.name + ' (' + HERMES_URL + ')\n' + (err || 'HTTP ' + resp.status));
      toast('❌ Error: ' + resp.status);
    } else {
      const data = await resp.json();
      const reply = data.choices?.[0]?.message?.content || JSON.stringify(data);
      addMsg('hermes', reply);
    }
  } catch(e) {
    removeLoading();
    const profile = PROFILES[currentProfile] || { name: 'Custom', hint: '' };
    if (e.name === 'TimeoutError' || e.name === 'AbortError') {
      addMsg('hermes', '⏰ **หมดเวลา** — Hermes ใช้เวลาคิดนานเกินไป (120s)\nลองถามใหม่ด้วยคำถามที่สั้นลง\n\nโหมด: ' + profile.name + ' (' + HERMES_URL + ')');
    } else {
      addMsg('hermes', '🔌 **เชื่อมต่อ Hermes ไม่ได้**\n\nโหมด: ' + profile.name + '\nURL: ' + HERMES_URL + '\n\nตรวจสอบ:\n• Pi 5 เปิดอยู่\n• ' + (profile.hint || 'URL ถูกต้อง'));
    }
    $('conn-banner').classList.add('show');
  }

  loading = false;
  $('send-btn').disabled = false;
  ta.focus();
}

function quickAsk(q) {
  $('ta').value = q;
  send();
}

// Auto-resize textarea
$('ta').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});

// Initial check
checkAuth();
</script>
