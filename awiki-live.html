<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A-Wiki Live — Hermes Chat</title>
<style>
:root{
  --elev-0:#06060d;--elev-1:#0c0c18;--elev-2:#14142a;--elev-3:#1e1e3a;
  --border:#15153a;--border2:#26265a;
  --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-tertiary:#64748b;
  --accent-brand:#5eead4;--accent-success:#34d399;--accent-warn:#fbbf24;--accent-danger:#f87171;
  --fs-xs:11px;--fs-sm:12px;--fs-md:14px;--fs-lg:16px;--fs-xl:20px;
  --r-sm:4px;--r-md:8px;--r-lg:12px;--r-full:9999px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--elev-0);color:var(--text-primary);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;font-size:var(--fs-md);display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:linear-gradient(135deg,var(--elev-2),var(--elev-3));border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
#header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--accent-brand),transparent)}
.brand{font-size:var(--fs-xl);font-weight:800;letter-spacing:.4px;background:linear-gradient(90deg,var(--accent-brand),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--accent-success);box-shadow:0 0 10px var(--accent-success);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spacer{flex:1}
.hdr-btn{padding:7px 14px;border-radius:var(--r-full);border:1px solid var(--border2);background:var(--elev-2);color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm);transition:all .2s}
.hdr-btn:hover{border-color:var(--accent-brand);color:var(--accent-brand);background:rgba(94,234,212,.08)}
.hdr-btn.accent{background:var(--accent-brand);color:var(--elev-0);border-color:var(--accent-brand);font-weight:700}
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:900px;margin:0 auto;width:100%}
#chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-msg{padding:10px 14px;border-radius:var(--r-lg);max-width:80%;word-break:break-word;font-size:var(--fs-md);line-height:1.5;animation:msgIn .3s ease}
.chat-msg.user{align-self:flex-end;background:var(--accent-brand);color:var(--elev-0)}
.chat-msg.hermes{align-self:flex-start;background:var(--elev-2);border:1px solid var(--border);color:var(--text-primary)}
.chat-msg.system{align-self:center;background:transparent;color:var(--text-tertiary);font-size:var(--fs-xs);max-width:95%;text-align:center;border:1px dashed var(--border);padding:6px 12px}
.chat-msg.error{align-self:center;background:rgba(248,113,113,.1);border:1px solid var(--accent-danger);color:var(--accent-danger);font-size:var(--fs-sm)}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-file-badge{display:inline-block;padding:2px 8px;border-radius:var(--r-sm);background:var(--elev-3);color:var(--accent-brand);font-size:var(--fs-xs);margin:2px}
#chat-input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--elev-1);align-items:flex-end;flex-shrink:0}
#chat-textarea{flex:1;resize:none;padding:10px 14px;border-radius:var(--r-lg);border:1px solid var(--border2);background:var(--elev-0);color:var(--text-primary);font-family:inherit;font-size:var(--fs-md);min-height:44px;max-height:120px;transition:border-color .2s}
#chat-textarea:focus{border-color:var(--accent-brand);box-shadow:0 0 12px rgba(94,234,212,.15);outline:none}
#chat-send-btn{padding:10px 16px;font-size:var(--fs-lg);min-height:44px;border-radius:var(--r-lg);border:none;background:var(--accent-brand);color:var(--elev-0);cursor:pointer;font-weight:700;transition:opacity .2s}
#chat-send-btn:disabled{opacity:.4;cursor:not-allowed}
#chat-status{padding:4px 16px;font-size:var(--fs-xs);color:var(--text-tertiary);min-height:20px;display:flex;align-items:center;gap:8px}
.chat-status-badge{padding:2px 8px;border-radius:var(--r-sm);background:var(--elev-3);color:var(--accent-brand);font-size:var(--fs-xs)}
#chat-file-count{font-size:var(--fs-xs);color:var(--accent-brand);padding:2px 6px;border-radius:var(--r-sm);background:rgba(94,234,212,.1);display:none}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text-tertiary);padding:40px}
.empty-state h2{font-size:var(--fs-lg);color:var(--text-secondary)}
.empty-state p{max-width:400px;text-align:center;line-height:1.6}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chat-quick-btn{padding:8px 16px;border-radius:var(--r-full);border:1px solid var(--border2);background:var(--elev-2);color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm);transition:all .2s}
.chat-quick-btn:hover{border-color:var(--accent-brand);color:var(--accent-brand);background:rgba(94,234,212,.08)}
#file-input{display:none}
@media (max-width:600px){
  .chat-msg{max-width:90%}
  .brand{font-size:var(--fs-lg)}
  #header{padding:8px 12px}
}
</style>
</head>
<body>
<div id="header">
  <div class="live-dot"></div>
  <span class="brand">A-Wiki Live</span>
  <span style="color:var(--text-tertiary);font-size:var(--fs-xs)">× Hermes</span>
  <div class="spacer"></div>
  <button class="hdr-btn" onclick="clearChat()">🗑 Clear</button>
  <button class="hdr-btn accent" id="btn-connect" onclick="testConnection()">🔌 Connect</button>
</div>

<div class="chat-container">
  <div id="chat-messages">
    <div class="empty-state" id="chat-empty">
      <h2>💬 A-Wiki Live × Hermes</h2>
      <p>คุยกับ Hermes AI Agent โดยตรง — ถามคำถาม สั่งงาน IoT ค้นหา Wiki หรืออัปโหลดไฟล์</p>
      <div class="quick-actions">
        <button class="chat-quick-btn" onclick="askQuick('ช่วยสรุปสถานะระบบ IoT ตอนนี้')">📡 IoT Status</button>
        <button class="chat-quick-btn" onclick="askQuick('ค้นหา DS18B20 ใน wiki')">🔍 Wiki Search</button>
        <button class="chat-quick-btn" onclick="askQuick('ช่วยตรวจสุขภาพ A-Wiki')">🏥 Health Check</button>
        <button class="chat-quick-btn" onclick="askQuick('model status')">🤖 Model Status</button>
      </div>
    </div>
  </div>
  <div id="chat-status">
    <span id="connection-status">⚪ Not connected</span>
    <span id="chat-file-count"></span>
  </div>
  <div id="chat-input-bar">
    <input type="file" id="file-input" multiple onchange="handleFiles(this.files)">
    <button class="hdr-btn" onclick="document.getElementById('file-input').click()" title="Attach files">📎</button>
    <textarea id="chat-textarea" placeholder="พิมพ์ข้อความ... (Enter = ส่ง, Shift+Enter = บรรทัดใหม่)" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
    <button id="chat-send-btn" onclick="sendChat()">▶</button>
  </div>
</div>

<script>
// ── Config ──
const HERMES_URL = 'https://awiki.sunday-estate.com';
let _chatFiles = [];
let _chatLoading = false;
let _connected = false;

// ── Init ──
document.getElementById('chat-textarea').focus();
autoResize(document.getElementById('chat-textarea'));
document.getElementById('chat-textarea').addEventListener('input',function(){autoResize(this)});

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ── Connection Test ──
async function testConnection(){
  const status=document.getElementById('connection-status');
  const btn=document.getElementById('btn-connect');
  status.textContent='🔄 Connecting...';
  btn.disabled=true;
  try{
    const resp=await fetch(HERMES_URL+'/health',{method:'GET',signal:AbortSignal.timeout(5000)});
    if(resp.ok){
      _connected=true;
      status.innerHTML='<span class="chat-status-badge">⚡ Connected</span>';
      btn.textContent='✅ Connected';
    }else{
      throw new Error('HTTP '+resp.status);
    }
  }catch(e){
    _connected=false;
    status.textContent='⚠ '+e.message+' — will use fetch anyway';
    btn.textContent='🔌 Retry';
  }
  btn.disabled=false;
}

// ── File Handling ──
function handleFiles(files){
  _chatFiles=Array.from(files);
  const badge=document.getElementById('chat-file-count');
  if(_chatFiles.length){
    badge.textContent='📎 '+_chatFiles.length+' file(s)';
    badge.style.display='inline';
  }
}

// ── Quick Actions ──
function askQuick(msg){
  document.getElementById('chat-textarea').value=msg;
  sendChat();
}

// ── Clear Chat ──
function clearChat(){
  document.getElementById('chat-messages').innerHTML='';
  const empty=document.createElement('div');
  empty.className='empty-state';
  empty.id='chat-empty';
  empty.innerHTML='<h2>💬 A-Wiki Live × Hermes</h2><p>Chat cleared. Start a new conversation!</p>';
  document.getElementById('chat-messages').appendChild(empty);
}

// ── Send Message ──
async function sendChat(){
  if(_chatLoading)return;
  const ta=document.getElementById('chat-textarea');
  const msg=ta.value.trim();
  if(!msg&&!_chatFiles.length)return;
  
  _chatLoading=true;
  document.getElementById('chat-send-btn').disabled=true;
  document.getElementById('chat-empty')?.remove();
  
  // Add user message
  addChatMessage('user',msg||'(files attached)',_chatFiles.map(f=>f.name));
  ta.value='';
  autoResize(ta);
  
  const statusEl=document.getElementById('chat-status');
  statusEl.innerHTML='<span class="chat-status-badge">⏳ Sending...</span>';
  
  try{
    let resp;
    if(_chatFiles.length){
      const formData=new FormData();
      formData.append('message',msg||'Files attached');
      _chatFiles.forEach(f=>formData.append('files',f));
      resp=await fetch(HERMES_URL,{method:'POST',body:formData,signal:AbortSignal.timeout(60000)});
    }else{
      resp=await fetch(HERMES_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:msg}),
        signal:AbortSignal.timeout(60000)
      });
    }
    
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    const reply=data.response||data.text||data.message||data.reply||JSON.stringify(data);
    addChatMessage('hermes',reply);
    statusEl.innerHTML='<span class="chat-status-badge">⚡ Connected</span>';
    _connected=true;
    document.getElementById('btn-connect').textContent='✅ Connected';
  }catch(e){
    addChatMessage('error','❌ '+e.message);
    statusEl.innerHTML='<span style="color:var(--accent-danger)">⚠ '+e.message+'</span>';
    _connected=false;
    document.getElementById('btn-connect').textContent='🔌 Retry';
  }
  
  _chatFiles=[];
  document.getElementById('file-input').value='';
  document.getElementById('chat-file-count').style.display='none';
  _chatLoading=false;
  document.getElementById('chat-send-btn').disabled=false;
  ta.focus();
}

// ── Add Chat Message ──
function addChatMessage(role,text,files){
  const wrap=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className='chat-msg '+role;
  let html=text.replace(/\n/g,'<br>');
  if(files&&files.length){
    html='<div>'+files.map(f=>'<span class="chat-file-badge">📎 '+f+'</span>').join('')+'</div>'+html;
  }
  div.innerHTML=html;
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}
</script>
</body>
</html>
