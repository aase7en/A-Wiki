<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>A-Wiki Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #f8f9fa; --surface: #ffffff; --surface-2: #f1f4f9; --border: rgba(0, 44, 95, 0.14); --text: #002c5f; --muted: rgba(8, 24, 50, 0.68); --accent: #f6a800; --radius: 10px; }
    [data-theme="dark"] { --bg: #0a0f1c; --surface: #131b2e; --border: rgba(255, 255, 255, 0.08); --text: #e2e8f0; }
    [data-theme="neobrutalist"] { --bg: #F9F9F9; --surface: #FFFFFF; --surface-2: #F3F4F6; --border: #000000; --text: #1F2937; --radius: 0px; --accent: #F6A800; }
    [data-theme="neobrutalist"] .card { border: 2px solid #000 !important; box-shadow: 0 1px 0 #000 !important; }
    [data-theme="neobrutalist"] .kpi-value { font-family: monospace; }
    [data-theme="neobrutalist"] .tag { border: 1px solid #000 !important; background: #F3F4F6 !important; font-family: monospace; }
    [data-theme="neobrutalist"] .ai-message { border-left: 3px solid #000 !important; background: #F3F4F6 !important; }
    [data-theme="neobrutalist"] .mono { font-family: monospace; }
    body { font-family: system-ui; background: var(--bg); color: var(--text); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .theme-selector { display: flex; gap: 8px; }
    .theme-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
    .theme-btn.active { background: var(--accent); color: white; font-weight: 600; }
    .layout { display: grid; grid-template-columns: 200px 1fr; gap: 24px; }
    .sidebar { display: flex; flex-direction: column; gap: 8px; }
    .nav-btn { text-align: left; padding: 12px 16px; border: 1px solid transparent; cursor: pointer; }
    .nav-btn.active { background: var(--surface-2); font-weight: 600; }
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-label { font-size: 11px; color: var(--muted); }
    .kpi-value { font-size: 24px; font-weight: 600; }
    .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
    .tag.success { background: #d1fae5; color: #065f46; }
    .tag.warn { background: #ffedd5; color: #9a3412; }
    .tag.danger { background: #fee2e2; color: #991b1b; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .mono { font-family: monospace; }
    .ai-container { display: flex; flex-direction: column; height: 400px; }
    .ai-messages { flex: 1; padding: 16px; overflow: auto; background: var(--surface); border: 1px solid var(--border); margin-bottom: 16px; }
    .ai-message { max-width: 80%; padding: 12px 16px; margin-bottom: 12px; }
    .ai-message.user { background: var(--surface-2); margin-left: auto; }
    .message-header { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-family: monospace; }
    .message-content { white-space: pre-wrap; }
    .ai-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; }
    .btn { padding: 10px 20px; background: var(--accent); border: 1px solid var(--border); color: white; border-radius: 4px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <div>A-Wiki Demo</div>
    <div class="theme-selector">
      <button class="theme-btn active" onclick="setTheme('light')">Light</button>
      <button class="theme-btn" onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn" onclick="setTheme('neobrutalist')">Neo-Brutalist</button>
    </div>
  </div>
  <div class="container">
    <div class="layout">
      <aside class="sidebar">
        <button class="nav-btn active" onclick="showPage('dashboard')" id="nav-dashboard">Dashboard</button>
        <button class="nav-btn" onclick="showPage('loans')" id="nav-loans">Loans</button>
        <button class="nav-btn" onclick="showPage('ai')" id="nav-ai">AI Analysis</button>
      </aside>
      <main>
        <div class="page active" id="page-dashboard">
          <h1 class="page-title">Dashboard</h1>
          <div class="kpi-grid">
            <div class="card"><div class="kpi-label">Cash Flow</div><div class="kpi-value">฿2.4M</div></div>
            <div class="card"><div class="kpi-label">Portfolio</div><div class="kpi-value">฿15.8M</div></div>
            <div class="card"><div class="kpi-label">Due Today</div><div class="kpi-value">3</div></div>
            <div class="card"><div class="kpi-label">Active Loans</div><div class="kpi-value">12</div></div>
          </div>
        </div>
        <div class="page" id="page-loans">
          <h1 class="page-title">Loans</h1>
          <div class="card">
            <table>
              <tr><th>ID</th><th>Borrower</th><th>Status</th></tr>
              <tr><td class="mono">L001</td><td>สมชาย ใจดี</td><td><span class="tag success">Active</span></td></tr>
              <tr><td class="mono">L002</td><td>วิภาวี มั่งมี</td><td><span class="tag warn">Due Soon</span></td></tr>
            </table>
          </div>
        </div>
        <div class="page" id="page-ai">
          <h1 class="page-title">AI Analysis</h1>
          <div class="ai-container">
            <div class="ai-messages" id="ai-messages">
              <div class="ai-message assistant">
                <div class="message-header">[AI] Welcome</div>
                <div class="message-content">สวัสดีครับ ผมคือ AI Assistant</div>
              </div>
            </div>
            <div style="display:flex;gap:12px;">
              <input class="ai-input" id="ai-input" placeholder="ถามคำถาม..." onkeypress="if(event.key === 'Enter') sendMessage()">
              <button class="btn" onclick="sendMessage()">ส่ง</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script>
    function setTheme(t) { document.body.setAttribute('data-theme',t); document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active')); document.getElementById('theme-'+t).classList.add('active'); }
    function showPage(p) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('nav-'+p).classList.add('active'); document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); }
    function sendMessage() { const i=document.getElementById('ai-input').value.trim(); if(!i)return; const c=document.getElementById('ai-messages'); if(c.querySelector('.welcome')) c.innerHTML=''; c.innerHTML+='<div class="ai-message user"><div class="message-header">[USER]</div><div>'+i+'</div></div>'; document.getElementById('ai-input').value=''; setTimeout(()=>{c.innerHTML+='<div class="ai-message assistant"><div class="message-header">[AI]</div><div>วิเคราะห์ "'+i+'" เรียบร้อยแล้ว\n\n[STATUS] วิเคราะห์สำเร็จ\n[DATA] 12 สัญญา\n[RISK] ต่ำ</div></div>'; c.scrollTop=c.scrollHeight; },1000); }
  </script>
</body>
</html>
